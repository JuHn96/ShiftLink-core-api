# [Spring Boot 애플리케이션 공통 설정]
spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: shiftlink # 향후 MSA 환경이나 모니터링 툴 표기에서 현재 앱을 식별하기 위한 고유 명칭
  
  # [PostgreSQL 데이터베이스 접속 환경 설정]
  datasource:
    # 접속 URL
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:shiftlink}
    # 접속 계정명
    username: ${DB_USERNAME:shiftlink}
    # [Security] 실제 비밀번호
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # [JPA (Hibernate) ORM 작동 방식 설정]
  jpa:
    hibernate:
      # 엔티티 ↔ 테이블 동기화 옵션 (AI의 잘못된 작성으로 테이블이 Drop되는 것을 방지하기 위해 생성/변경을 막고 오직 '검증(validate)'만 허용)
      ddl-auto: validate
    # 서버 실행 중에 백그라운드에서 발생하는 실제 SQL 쿼리문을 터미널 콘솔에 출력 (디버깅 용도)
    show-sql: true
    properties:
      hibernate:
        # 콘솔에 출력되는 한 줄짜리 긴 SQL 로그를 가독성 좋게 들여쓰기(Formatting)하여 포장
        format_sql: true
